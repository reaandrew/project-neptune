name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.9.0'
  AWS_REGION: 'eu-west-2'
  GO_VERSION: '1.25'
  NODE_VERSION: '22'

permissions:
  id-token: write
  contents: read

jobs:
  build-lambdas:
    name: Build Lambda - ${{ matrix.lambda }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lambda:
          - api-authorizer
          - message-get
          - brand-jobs-create
          - brand-jobs-get
          - brand-jobs-list
          - ads-create
          - ads-get
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: lambdas/go.sum

      - name: Build
        working-directory: lambdas
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o ${{ matrix.lambda }}/bootstrap ./${{ matrix.lambda }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-${{ matrix.lambda }}
          path: lambdas/${{ matrix.lambda }}/bootstrap
          retention-days: 1

  build-brand-worker:
    name: Build brand-worker container image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo exists
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          aws ecr describe-repositories \
            --repository-names project-neptune-brand-worker \
            --region "$AWS_REGION" \
            >/dev/null 2>&1 \
            || aws ecr create-repository \
                 --repository-name project-neptune-brand-worker \
                 --region "$AWS_REGION" \
                 --image-scanning-configuration scanOnPush=true

      - name: Build, tag, push
        id: push
        env:
          REGISTRY: ${{ steps.login.outputs.registry }}
          REPOSITORY: project-neptune-brand-worker
          IMAGE_TAG: ${{ github.sha }}
        working-directory: lambdas/brand-worker
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          docker tag "$IMAGE_URI" "$REGISTRY/$REPOSITORY:latest"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  build-ads-worker:
    name: Build ads-worker container image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo exists
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          aws ecr describe-repositories \
            --repository-names project-neptune-ads-worker \
            --region "$AWS_REGION" \
            >/dev/null 2>&1 \
            || aws ecr create-repository \
                 --repository-name project-neptune-ads-worker \
                 --region "$AWS_REGION" \
                 --image-scanning-configuration scanOnPush=true

      - name: Build, tag, push
        id: push
        env:
          REGISTRY: ${{ steps.login.outputs.registry }}
          REPOSITORY: project-neptune-ads-worker
          IMAGE_TAG: ${{ github.sha }}
        working-directory: lambdas/ads-worker
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          docker tag "$IMAGE_URI" "$REGISTRY/$REPOSITORY:latest"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  deploy:
    name: Terraform apply & sync site
    runs-on: ubuntu-latest
    needs: [build-lambdas, build-frontend, build-brand-worker, build-ads-worker]
    env:
      TF_VAR_brand_worker_image_uri: ${{ needs.build-brand-worker.outputs.image_uri }}
      TF_VAR_ads_worker_image_uri: ${{ needs.build-ads-worker.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download lambda artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lambda-*
          path: lambda-artifacts

      - name: Place lambda binaries
        run: |
          for lambda in api-authorizer message-get brand-jobs-create brand-jobs-get brand-jobs-list ads-create ads-get; do
            cp "lambda-artifacts/lambda-${lambda}/bootstrap" "lambdas/${lambda}/bootstrap"
            chmod +x "lambdas/${lambda}/bootstrap"
          done

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt check
        working-directory: ./terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ./terraform
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -input=false

      - name: Sync frontend to S3
        working-directory: ./terraform
        run: |
          BUCKET=$(terraform output -raw bucket_name)
          # Hashed asset bundles - long cache.
          aws s3 sync ../frontend/dist/assets/ "s3://${BUCKET}/assets/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"
          # Everything else (index.html, favicons) - no-cache.
          aws s3 sync ../frontend/dist/ "s3://${BUCKET}/" \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache"

      - name: Invalidate site CloudFront
        working-directory: ./terraform
        run: |
          CF_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id "$CF_ID" --paths "/*" >/dev/null
          echo "Invalidated site CloudFront: $CF_ID"

      - name: Smoke test - site edge gate (expect 302 to ara login)
        run: |
          URL="https://projectneptune.andrewreaassociates.com/"
          for i in 1 2 3 4 5 6 7 8; do
            CODE=$(curl -sk -o /dev/null -D /tmp/headers -w "%{http_code}" "$URL" || echo "000")
            LOC=$(grep -i '^location:' /tmp/headers | head -1 | tr -d '\r' | sed 's/^[Ll]ocation:[[:space:]]*//')
            if [ "$CODE" = "302" ] && echo "$LOC" | grep -q "andrewreaassociates.com/admin.html"; then
              echo "Edge gate OK (HTTP $CODE → $LOC)"
              echo "::notice title=Site live::$URL"
              exit 0
            fi
            echo "Attempt $i: HTTP $CODE loc=$LOC — retrying..."
            sleep 15
          done
          echo "Edge gate did not 302 to ara login"
          exit 1

      - name: Smoke test - API (expect 401, unauthenticated)
        run: |
          URL="https://api.projectneptune.andrewreaassociates.com/message"
          for i in 1 2 3 4 5; do
            CODE=$(curl -sk -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$CODE" = "401" ] || [ "$CODE" = "403" ]; then
              echo "API auth gate OK (HTTP $CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $CODE — retrying..."
            sleep 10
          done
          echo "API did not return 401/403 for unauthenticated request"
          exit 1
